#APPLICATION

spring.application.name=meddelivery
server.port=8080

#DATABASE

# spring.datasource.url=${DB_URL}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:5432/meddelivery
spring.datasource.username=postgres
spring.datasource.password=Saliim47
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA / HIBERNATE

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=false

#FLYWAY MIGRATION

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


#REDIS

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}


#JWT

jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction123456789}
jwt.expiration=86400000


#OTP

otp.expiration.minutes=5


#FIREBASE (PHONE OTP)

firebase.service.account.path=classpath:firebase-service-account.json


#EMAIL (OTP)

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


#SWAGGER

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html