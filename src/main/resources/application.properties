#RATE LIMITING

rate.limit.otp.send.max=3
rate.limit.otp.send.window.minutes=15
rate.limit.otp.verify.max=5
rate.limit.otp.verify.window.minutes=15


#WEBSOCKET

websocket.allowed.origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}
