version: '3.8'

services:

#   SPRING BOOT APP
  app:
    build: .
    container_name: meddelivery_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meddelivery_network
    restart: unless-stopped


#   POSTGRESQL
  postgres:
    image: postgres:16-alpine
    container_name: meddelivery_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meddelivery
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d meddelivery"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meddelivery_network
    restart: unless-stopped

#   REDIS
  redis:
    image: redis:7-alpine
    container_name: meddelivery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meddelivery_network
    restart: unless-stopped

#   VOLUMES

volumes:
  postgres_data:
  redis_data:


#   NETWORKS
networks:
  meddelivery_network:
    driver: bridge